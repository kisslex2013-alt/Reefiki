name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Package index target"
        required: true
        default: build-only
        type: choice
        options:
          - build-only
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  validate-target:
    name: Validate release target
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require version tag for PyPI
        if: ${{ github.event.inputs.target == 'pypi' && !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          echo "::error::PyPI publishing requires running this workflow from a refs/tags/v* tag."
          exit 1

      - name: Report target
        env:
          RELEASE_TARGET: ${{ github.event.inputs.target }}
        run: |
          echo "Release target: ${RELEASE_TARGET}"

  build-and-test:
    name: Build and test distributions
    needs: validate-target
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install release dependencies
        run: python -m pip install --upgrade pip build pytest twine

      - name: Run tests
        run: python -m pytest -q

      - name: Build package artifacts
        run: python -m build

      - name: Check package metadata
        run: python -m twine check --strict dist/*

      - name: Upload package distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    if: ${{ github.event.inputs.target == 'testpypi' }}
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        # pypa/gh-action-pypi-publish is a container action whose image tag follows
        # the action ref; pinning it to a commit SHA makes GHCR pull a non-existent
        # SHA-named image. Keep the upstream-supported release tag for this action.
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    if: ${{ github.event.inputs.target == 'pypi' && startsWith(github.ref, 'refs/tags/v') }}
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        # pypa/gh-action-pypi-publish is a container action whose image tag follows
        # the action ref; pinning it to a commit SHA makes GHCR pull a non-existent
        # SHA-named image. Keep the upstream-supported release tag for this action.
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
